name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            musl_target: x86_64-linux-musl
          - target: aarch64-unknown-linux-musl
            musl_target: aarch64-linux-musl

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install musl tools
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Install musl cross compiler
      if: matrix.target == 'aarch64-unknown-linux-musl'
      run: |
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Install Rust toolchains
      run: |
        rustup toolchain install stable
        rustup toolchain install nightly --component rust-src
        rustup target add --toolchain stable ${{ matrix.target }}

    - name: Install bpf-linker
      run: cargo install bpf-linker --locked

    - name: Build release binary
      run: cargo build --package rfw --release --target ${{ matrix.target }}
      env:
        CC: ${{ matrix.target == 'aarch64-unknown-linux-musl' && 'aarch64-linux-gnu-gcc' || 'musl-gcc' }}
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

    - name: Prepare binary
      run: |
        mkdir -p artifacts
        cp target/${{ matrix.target }}/release/rfw artifacts/rfw-${{ matrix.target }}
        chmod +x artifacts/rfw-${{ matrix.target }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v5
      with:
        name: rfw-${{ matrix.target }}
        path: artifacts/rfw-${{ matrix.target }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Download all artifacts
      uses: actions/download-artifact@v5
      with:
        path: artifacts

    - name: Prepare release files
      run: |
        # 创建临时目录存放所有二进制文件
        mkdir -p release-files

        # 将所有二进制文件移到临时目录
        find artifacts -type f -name 'rfw-*' -exec mv {} release-files/ \;

        # 删除旧的artifacts目录并用临时目录替换
        rm -rf artifacts
        mv release-files artifacts

        # 创建统一的checksums文件
        cd artifacts
        sha256sum rfw-* > checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/rfw-*
          artifacts/checksums.txt
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## Install with deployment script

          Recommended interactive setup:

          ```bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/Incubal-Firewall.sh -o Incubal-Firewall.sh
          sudo bash Incubal-Firewall.sh
          ```

          Non-interactive examples:

          ```bash
          # Default rules for CN: Email / HTTP / SOCKS5 / FET-Strict / WireGuard
          sudo bash Incubal-Firewall.sh --iface eth0 --countries CN --rules default --log-port-access --yes

          # Block all inbound traffic from CN
          sudo bash Incubal-Firewall.sh --iface eth0 --block-all-from CN --log-port-access --yes

          # Management shortcut installed by the deployment script
          sudo incudalrfw
          sudo incudalrfw --help
          sudo incudalrfw --blocked-stats
          sudo incudalrfw raw stats --blocked-only

          # Service management
          sudo bash Incubal-Firewall.sh --status
          sudo bash Incubal-Firewall.sh --blocked-stats
          sudo bash Incubal-Firewall.sh --blocked-logs
          sudo bash Incubal-Firewall.sh --watch-blocked
          sudo bash Incubal-Firewall.sh --logs
          sudo bash Incubal-Firewall.sh --restart
          ```

          ## Manual binary installation

          ```bash
          # x86_64 (Intel/AMD)
          curl -fL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rfw-x86_64-unknown-linux-musl -o rfw
          chmod +x rfw
          sudo mv rfw /usr/local/bin/rfw

          # ARM64 (Raspberry Pi, AWS Graviton, etc.)
          curl -fL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rfw-aarch64-unknown-linux-musl -o rfw
          chmod +x rfw
          sudo mv rfw /usr/local/bin/rfw
          ```

          ## Manual usage

          ```bash
          # Block all inbound traffic from CN
          sudo rfw --iface eth0 --countries CN --block-all

          # Block HTTP and SOCKS5 from CN
          sudo rfw --iface eth0 --countries CN --block-http --block-socks5 --log-port-access

          # View blocked source IP, target port, and counters
          sudo rfw stats --blocked-only

          # Block email sending
          sudo rfw --iface eth0 --block-email
          ```

          ## Requirements

          - Linux kernel 5.15+ with XDP support
          - Root privileges to attach XDP programs
          - Network interface with XDP driver support

          ## Verify checksums

          ```bash
          sha256sum -c checksums.txt
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
